events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain application/json text/css text/javascript;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # HTTP → HTTPS 重定向
    server {
        listen 80;
        server_name kada.click www.kada.click;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name kada.click www.kada.click;

        ssl_certificate     /etc/letsencrypt/live/kada.click/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kada.click/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # API
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # 短链重定向
        location /r/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # 健康检查
        location /api/health {
            proxy_pass http://127.0.0.1:8080;
        }

        # Next.js 静态资源
        location /_next/ {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # 前端
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
