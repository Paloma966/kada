name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ========== Go 后端测试 ==========
  backend-test:
    name: Go Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kada
          POSTGRES_PASSWORD: kada123
          POSTGRES_DB: kada_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install dependencies
        run: cd backend && go mod download

      - name: Run migrations
        env:
          DATABASE_URL: postgres://kada:kada123@localhost:5432/kada_test?sslmode=disable
        run: cd backend && go run ./cmd/migrate/

      - name: Run vet
        run: cd backend && go vet ./...

      - name: Run tests
        env:
          DATABASE_URL: postgres://kada:kada123@localhost:5432/kada_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
        run: cd backend && go test ./... -v -count=1

  # ========== 前端构建检查 ==========
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  # ========== 部署到生产服务器 ==========
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ---- 构建后端 ----
      - name: Build Go binary
        run: cd backend && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/server ./cmd/server/

      # ---- 构建前端 ----
      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Package frontend
        run: |
          cd frontend
          tar czf /tmp/kada-fe-standalone.tar.gz -C .next/standalone .
          tar czf /tmp/kada-fe-static.tar.gz -C .next static/

      # ---- 部署到服务器 ----
      - name: Setup SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Deploy backend
        run: |
          scp backend/bin/server ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/kada/backend/bin/server.new
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "systemctl stop kada-api && mv /opt/kada/backend/bin/server.new /opt/kada/backend/bin/server && systemctl start kada-api"
          echo "✅ Backend deployed"

      - name: Deploy frontend
        run: |
          scp /tmp/kada-fe-standalone.tar.gz /tmp/kada-fe-static.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/kada/frontend && rm -rf .next/static node_modules server.js package.json static && tar xzf /tmp/kada-fe-standalone.tar.gz && mkdir -p .next && tar xzf /tmp/kada-fe-static.tar.gz -C .next && rm /tmp/kada-fe-*.tar.gz && systemctl restart kada-frontend"
          echo "✅ Frontend deployed"

      - name: Verify deployment
        run: |
          sleep 2
          curl -s http://${{ secrets.SERVER_HOST }}/api/health
          echo
          curl -s -o /dev/null -w "Frontend HTTP %{http_code}" http://${{ secrets.SERVER_HOST }}/
