name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ========== Go 后端测试 ==========
  backend-test:
    name: Go Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kada
          POSTGRES_PASSWORD: kada123
          POSTGRES_DB: kada_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: cd backend && go mod download

      - name: Run vet
        run: cd backend && go vet ./...

      - name: Run tests
        env:
          DATABASE_URL: postgres://kada:kada123@localhost:5432/kada_test?sslmode=disable
          JWT_SECRET: test-secret
        run: cd backend && go test ./... -v -count=1

  # ========== 前端构建检查 ==========
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  # ========== 部署到生产服务器 ==========
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ---- 构建后端 ----
      - name: Build Go binary
        run: cd backend && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/server ./cmd/server/

      # ---- 构建前端 ----
      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Package frontend
        run: |
          cd frontend
          mkdir -p ../deploy-pkg
          tar czf ../deploy-pkg/kada-fe-standalone.tar.gz -C .next/standalone .
          tar czf ../deploy-pkg/kada-fe-static.tar.gz -C .next static/

      # ---- 部署 ----
      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "backend/bin/server,deploy-pkg/*"
          target: /tmp/kada-deploy/
          strip_components: 0

      - name: Restart services
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 替换后端
            cp /tmp/kada-deploy/backend/bin/server /opt/kada/backend/bin/server.new
            systemctl stop kada-api
            mv /opt/kada/backend/bin/server.new /opt/kada/backend/bin/server
            systemctl start kada-api
            echo "✅ Backend restarted"

            # 替换前端
            cd /opt/kada/frontend
            rm -rf .next/static node_modules server.js package.json static
            tar xzf /tmp/kada-deploy/deploy-pkg/kada-fe-standalone.tar.gz
            mkdir -p .next
            tar xzf /tmp/kada-deploy/deploy-pkg/kada-fe-static.tar.gz -C .next
            rm -rf /tmp/kada-deploy
            systemctl restart kada-frontend
            echo "✅ Frontend restarted"

      - name: Verify
        run: |
          sleep 2
          curl -s http://${{ secrets.SERVER_HOST }}/api/health
          echo
          curl -s -o /dev/null -w "Frontend: HTTP %{http_code}\n" http://${{ secrets.SERVER_HOST }}/
