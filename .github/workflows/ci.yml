name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ========== Go 后端测试 ==========
  backend-test:
    name: Go Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kada
          POSTGRES_PASSWORD: kada123
          POSTGRES_DB: kada_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Download dependencies
        run: cd backend && go mod download

      - name: Run vet
        run: cd backend && go vet ./...

      - name: Run tests
        env:
          DATABASE_URL: postgres://kada:kada123@localhost:5432/kada_test?sslmode=disable
          JWT_SECRET: test-secret
        run: cd backend && go test ./... -v -count=1

  # ========== 前端构建检查 ==========
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"


      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  # ========== 部署到生产服务器 ==========
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"


      # ---- 构建后端 ----
      - name: Build Go binary
        run: cd backend && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/server ./cmd/server/

      # ---- 构建前端 ----
      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Package frontend
        run: |
          cd frontend
          tar czf /tmp/kada-fe-standalone.tar.gz -C .next/standalone .
          tar czf /tmp/kada-fe-static.tar.gz -C .next static/

      # ---- 配置 SSH ----
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # 添加服务器 host key
          ssh-keyscan ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          # 测试连接
          ssh -o ConnectTimeout=10 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo SSH_OK"

      # ---- 部署 ----
      - name: Deploy backend
        run: |
          scp -o ConnectTimeout=30 backend/bin/server ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/kada/backend/bin/server.new
          ssh -o ConnectTimeout=10 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "systemctl stop kada-api && mv /opt/kada/backend/bin/server.new /opt/kada/backend/bin/server && systemctl start kada-api"
          echo "✅ Backend deployed"

      - name: Deploy frontend
        run: |
          scp -o ConnectTimeout=30 /tmp/kada-fe-standalone.tar.gz /tmp/kada-fe-static.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/
          ssh -o ConnectTimeout=10 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /opt/kada/frontend && rm -rf .next/static node_modules server.js package.json static && tar xzf /tmp/kada-fe-standalone.tar.gz && mkdir -p .next && tar xzf /tmp/kada-fe-static.tar.gz -C .next && rm /tmp/kada-fe-*.tar.gz && systemctl restart kada-frontend"
          echo "✅ Frontend deployed"

      - name: Verify deployment
        run: |
          sleep 2
          echo "API Health:"
          curl -s http://${{ secrets.SERVER_HOST }}/api/health
          echo
          echo "Frontend:"
          curl -s -o /dev/null -w "HTTP %{http_code}" http://${{ secrets.SERVER_HOST }}/
