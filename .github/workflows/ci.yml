name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ========== Go 后端测试 ==========
  backend-test:
    name: Go Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kada
          POSTGRES_PASSWORD: kada123
          POSTGRES_DB: kada_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('backend/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install dependencies
        run: cd backend && go mod download

      - name: Run migrations
        env:
          DATABASE_URL: postgres://kada:kada123@localhost:5432/kada_test?sslmode=disable
        run: cd backend && go run ./cmd/migrate/

      - name: Run vet
        run: cd backend && go vet ./...

      - name: Run tests
        env:
          DATABASE_URL: postgres://kada:kada123@localhost:5432/kada_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
        run: cd backend && go test ./... -v -count=1

  # ========== 前端构建检查 ==========
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  # ========== Docker 镜像构建 ==========
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t kada-api:latest ./backend

      - name: Build frontend image
        run: docker build -t kada-frontend:latest ./frontend

      - name: Show images
        run: docker images | grep kada
