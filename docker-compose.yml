version: "3.9"

services:
  # ========== 基础设施 ==========

  postgres:
    image: postgres:16-alpine
    container_name: kada-postgres
    environment:
      POSTGRES_USER: kada
      POSTGRES_PASSWORD: kada123
      POSTGRES_DB: kada
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kada"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kada-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ========== Go 后端 ==========

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kada-api
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://kada:kada123@postgres:5432/kada?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "kada-dev-secret-change-in-production"
      GIN_MODE: "debug"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: go run ./cmd/server/main.go

  # ========== Nginx 反向代理 ==========

  nginx:
    image: nginx:alpine
    container_name: kada-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
