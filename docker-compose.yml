services:
  # ========== 基础设施 ==========

  postgres:
    image: postgres:16-alpine
    container_name: kada-postgres
    environment:
      POSTGRES_USER: kada
      POSTGRES_PASSWORD: kada123
      POSTGRES_DB: kada
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kada"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kada-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ========== 数据库迁移 ==========

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrate
    container_name: kada-migrate
    environment:
      DATABASE_URL: "postgres://kada:kada123@postgres:5432/kada?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    command: /migrate

  # ========== Go 后端 ==========

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kada-api
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://kada:kada123@postgres:5432/kada?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "kada-production-secret-change-me"
      GIN_MODE: "release"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ========== 前端 (Next.js) ==========

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kada-frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://api:8080"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ========== Nginx 反向代理 ==========

  nginx:
    image: nginx:alpine
    container_name: kada-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
